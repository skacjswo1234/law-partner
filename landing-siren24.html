<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>법무법인 파트너 | 상품 홍보페이지</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #ffffff;
            padding: 0;
            margin: 0;
        }

        /* 740px 고정 컨테이너 */
        .landing-container {
            width: 740px;
            margin: 0 auto;
            background-color: #ffffff;
        }

        /* 테이블 기반 레이아웃 */
        .landing-table {
            width: 740px;
            border-collapse: collapse;
            border-spacing: 0;
            margin: 0;
            padding: 0;
        }

        .landing-table td {
            padding: 0;
            margin: 0;
            vertical-align: top;
        }

        /* 통이미지 스타일 */
        .full-image {
            width: 740px;
            height: auto;
            display: block;
            border: 0;
        }

        /* 이미지맵을 위한 이미지 스타일 */
        .image-map-img {
            width: 740px;
            height: auto;
            display: block;
            border: 0;
        }
    </style>
</head>
<body>
    <!-- 740px 고정 컨테이너 -->
    <div class="landing-container">
        <!-- 테이블 기반 레이아웃 -->
        <table class="landing-table" cellpadding="0" cellspacing="0" border="0">
            <!-- 섹션 1: 메인 배너 (통이미지) -->
            <tr>
                <td>
                    <img src="images/pc/h-1.png" alt="법무법인 파트너 메인 배너" class="full-image">
                    <!-- 이미지맵 사용 예시:
                    <img src="images/pc/h-1.png" alt="법무법인 파트너 메인 배너" class="image-map-img" usemap="#mainbanner">
                    <map name="mainbanner">
                        <area shape="rect" coords="100,200,300,250" href="https://example.com/apply" alt="상담 신청">
                    </map>
                    -->
                </td>
            </tr>

            <!-- 섹션 2: 상품 소개 (통이미지) -->
            <tr>
                <td>
                    <img src="images/pc/h-2.png" alt="법무법인 파트너 서비스 소개" class="full-image">
                </td>
            </tr>

            <!-- 섹션 3: 상품 특징 (통이미지) -->
            <tr>
                <td>
                    <img src="images/pc/h-3.png" alt="법무법인 파트너 전문 변호사 상담" class="full-image">
                </td>
            </tr>

            <!-- 섹션 4: 프로세스 (통이미지) -->
            <tr>
                <td>
                    <img src="images/pc/h-4.png" alt="법무법인 파트너 상담 프로세스" class="full-image">
                </td>
            </tr>

            <!-- 섹션 5: 성공 사례 (통이미지) -->
            <tr>
                <td>
                    <img src="images/pc/h-5.png" alt="법무법인 파트너 성공 사례" class="full-image">
                </td>
            </tr>

            <!-- 섹션 6: 신청 안내 (이미지 안에 버튼 포함 + 이미지맵으로 클릭 영역 지정) -->
            <tr>
                <td>
                    <!-- 
                    주의: 이미지 파일(h-10.png) 안에 신청 버튼 이미지도 함께 포함되어 있어야 합니다.
                    이미지맵의 coords 값은 실제 이미지에서 버튼의 위치 좌표입니다.
                    coords="x1,y1,x2,y2" 형식: (x1,y1) 왼쪽 상단, (x2,y2) 오른쪽 하단
                    -->
                    <img src="images/pc/h-10.png" alt="법무법인 파트너 상담 신청" class="image-map-img" usemap="#apply">
                    <map name="apply">
                        <!-- 
                        버튼 클릭 시 이동할 링크 종류:
                        1. 상담 신청 랜딩 페이지로 이동 (메인 사이트 또는 별도 랜딩 페이지)
                        2. 전화 걸기
                        3. 카카오톡 링크
                        -->
                        <!-- 예시 1: 상담 신청 랜딩 페이지로 이동 (가장 일반적) -->
                        <area shape="rect" coords="200,400,540,480" href="https://lawmariel.co.kr/#contact" alt="상담 신청하기">
                        <!-- 예시 2: 전화 상담 -->
                        <area shape="rect" coords="200,500,540,580" href="tel:010-7231-0459" alt="전화 상담">
                        <!-- 예시 3: 카카오톡 상담 -->
                        <!-- <area shape="rect" coords="200,600,540,680" href="http://pf.kakao.com/_inbpn/chat" alt="카톡 상담"> -->
                        <!-- 
                        참고: 
                        - coords 값은 실제 이미지에서 버튼의 위치 좌표로 수정하세요
                        - href 값은 실제 이동할 페이지 주소로 변경하세요
                        - 여러 개의 버튼이 있다면 각각 area 태그를 추가하세요
                        -->
                    </map>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
